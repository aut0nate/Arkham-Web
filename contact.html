<!DOCTYPE html>
<html lang="en-GB">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta name="keywords" content="contact Arkham, book a build call, AI product studio, automation project">
  <meta name="description" content="Contact Arkham to book a build call for an AI, automation, or cloud project.">
  <meta name="author" content="Arkham">
  <meta name="robots" content="index,follow">
  <link rel="canonical" href="https://arkham.live/contact.html">
  <link rel="icon" href="images/arkham-logo.png" type="image/png">
  <title>Contact | Arkham AI Product Studio</title>
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Organization",
    "name": "Arkham",
    "url": "https://arkham.live",
    "logo": "https://arkham.live/images/arkham-logo.png",
    "description": "Arkham is an AI product studio building practical AI tools, workflow automations, and cloud systems.",
    "contactPoint": [{
      "@type": "ContactPoint",
      "email": "contact@arkham.live",
      "contactType": "project enquiries"
    }]
  }
  </script>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
  <header class="site-header">
    <div class="nav-shell">
      <a class="brand" href="index.html" aria-label="Arkham home">
        <span class="brand-mark"><img src="images/arkham-logo.png" alt="Arkham logo"></span>
        <span>Arkham</span>
      </a>
      <button class="nav-toggle" type="button" aria-controls="site-nav" aria-expanded="false">Menu</button>
      <nav class="nav-links" id="site-nav" aria-label="Primary navigation">
        <a href="index.html">Home</a>
        <a href="service.html">Services</a>
        <a href="about.html">About</a>
        <a class="is-active" href="contact.html">Contact</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="section compact contact-intro">
      <p class="eyebrow">Contact</p>
      <h1>Get in Touch</h1>
      <p class="lede">Send the shape of the project: the workflow, the users, the data involved, and what success would look like. The local form stores submissions for review.</p>
    </section>

    <section class="section contact-section">
      <div class="contact-card centred">
        <form id="contactForm" class="form-grid" action="/api/contact" method="post" novalidate>
          <div class="field">
            <label for="contactName">Full name</label>
            <input type="text" id="contactName" name="name" required autocomplete="name" minlength="2" maxlength="80" placeholder="Jane Doe">
            <div class="invalid-feedback d-none" data-error-for="name"></div>
          </div>
          <div class="field">
            <label for="contactEmail">Work email</label>
            <input type="email" id="contactEmail" name="email" required autocomplete="email" maxlength="254" placeholder="you@company.com">
            <div class="invalid-feedback d-none" data-error-for="email"></div>
          </div>
          <div class="field">
            <label for="contactCompany">Company</label>
            <input type="text" id="contactCompany" name="company" autocomplete="organization" maxlength="120" placeholder="Company or team name">
          </div>
          <div class="field">
            <label for="contactPhone">Phone <span class="field-hint">optional</span></label>
            <input type="tel" id="contactPhone" name="phone" autocomplete="tel" pattern="^[+]?[-() \d]{7,20}$" minlength="7" maxlength="20">
            <div class="invalid-feedback d-none" data-error-for="phone"></div>
          </div>
          <div class="field">
            <label for="contactMessage">Project details</label>
            <textarea id="contactMessage" name="message" rows="7" required minlength="20" maxlength="1500" placeholder="What are you trying to improve? Include users, workflow, timeline, systems, and constraints."></textarea>
            <div class="invalid-feedback d-none" data-error-for="message"></div>
          </div>
          <label class="checkbox-field" for="contactConsent">
            <input type="checkbox" id="contactConsent" name="consent" value="yes" required>
            <span>I agree to be contacted about my enquiry and understand my data will be handled for that purpose.</span>
          </label>
          <div class="invalid-feedback d-none" data-error-for="consent"></div>
          <div class="form-status d-none" role="alert" data-role="form-status"></div>
          <button type="submit" class="button">Send enquiry</button>
        </form>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="footer-grid">
      <div class="footer-brand">
        <div>
          <strong>Arkham</strong>
          <p>&copy; <span id="displayYear"></span> Arkham. AI product studio.</p>
        </div>
      </div>
    </div>
  </footer>
  <script src="js/custom.js" defer></script>
</body>
</html>
